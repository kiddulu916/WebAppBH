name: E2E Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-e2e:
    name: Backend E2E (pytest + SSEMonitor)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-timeout httpx

      - name: Generate API key
        run: echo "WEB_APP_BH_API_KEY=$(python -c 'import secrets; print(secrets.token_hex(32))')" >> $GITHUB_ENV

      - name: Build base image
        run: docker compose build webbh-base

      - name: Start stack
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.test.yml \
            up -d --build \
            --scale ollama=0 \
            --scale docker-android=0 \
            --scale mobsf=0
        env:
          OLLAMA_AVAILABLE: "false"
          WEB_APP_BH_API_KEY: ${{ env.WEB_APP_BH_API_KEY }}

      - name: Wait for orchestrator health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && exit 0
            echo "Waiting for stack... attempt $i"
            sleep 10
          done
          echo "Stack did not become healthy" && exit 1

      - name: Run backend e2e suite
        run: pytest tests/e2e/ --e2e -v --timeout=7200
        env:
          OLLAMA_AVAILABLE: "false"
          WEB_APP_BH_API_KEY: ${{ env.WEB_APP_BH_API_KEY }}

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  frontend-e2e:
    name: Frontend E2E (Playwright — seeded data)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Install Playwright browsers
        run: cd dashboard && npx playwright install --with-deps chromium

      - name: Build base image
        run: docker compose build webbh-base

      - name: Start stack (postgres + redis + orchestrator + dashboard)
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.test.yml \
            up -d --build \
            postgres redis orchestrator dashboard
        env:
          ENABLE_TEST_SEED: "true"

      - name: Wait for services
        run: |
          for svc in "http://localhost:8001/api/v1/health" "http://localhost:3000"; do
            for i in $(seq 1 24); do
              curl -sf "$svc" && break
              echo "Waiting for $svc... attempt $i"
              sleep 5
            done
          done

      - name: Run Playwright suite (chromium project — seeded data only)
        run: cd dashboard && npx playwright test --config=e2e/playwright.config.ts --project=chromium
        env:
          WEB_APP_BH_API_KEY: ${{ secrets.WEB_APP_BH_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v
