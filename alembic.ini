[alembic]
script_location = alembic
prepend_sys_path = .

# The URL is overridden in env.py from environment variables.
# This fallback is for offline mode only.
sqlalchemy.url = postgresql+asyncpg://webbh_admin:changeme@localhost:5432/webbh

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
