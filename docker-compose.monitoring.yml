# Monitoring stack — use with: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up
services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: webbh-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - webbh-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: webbh-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-webbh}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - webbh-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: webbh-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - webbh-net

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: webbh-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-webbh_admin}:${DB_PASS:-changeme}@postgres:5432/${DB_NAME:-webbh}?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - webbh-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: webbh-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - webbh-net

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: webbh-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      - webbh-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  webbh-net:
    external: true
