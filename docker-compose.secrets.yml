# Secrets override — use with: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up
# Requires: docker secret create db_pass <file>, or uses file-based secrets below.
#
# File-based secrets for development:
#   echo "changeme" > secrets/db_pass.txt
#   echo "your-api-key" > secrets/api_key.txt
#   echo "your-shodan-key" > secrets/shodan_key.txt
#   echo "your-securitytrails-key" > secrets/securitytrails_key.txt

services:
  postgres:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_pass
    secrets:
      - db_pass

  orchestrator:
    environment:
      DB_PASS_FILE: /run/secrets/db_pass
      WEB_APP_BH_API_KEY_FILE: /run/secrets/api_key
      SHODAN_API_KEY_FILE: /run/secrets/shodan_key
      SECURITYTRAILS_API_KEY_FILE: /run/secrets/securitytrails_key
    secrets:
      - db_pass
      - api_key
      - shodan_key
      - securitytrails_key

secrets:
  db_pass:
    file: ./secrets/db_pass.txt
  api_key:
    file: ./secrets/api_key.txt
  shodan_key:
    file: ./secrets/shodan_key.txt
  securitytrails_key:
    file: ./secrets/securitytrails_key.txt
