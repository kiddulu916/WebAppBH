services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: webbh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-webbh}
      POSTGRES_USER: ${DB_USER:-webbh_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./shared/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webbh_admin} -d ${DB_NAME:-webbh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Redis — message broker (Streams)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: webbh-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Orchestrator — FastAPI control plane
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: webbh-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WEB_APP_BH_API_KEY: ${WEB_APP_BH_API_KEY:-}
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001"
      ENABLE_TEST_SEED: ${ENABLE_TEST_SEED:-true}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Info Gathering Worker — WSTG 4.1 information gathering
  # ---------------------------------------------------------------------------
  info-gathering:
    build:
      context: .
      dockerfile: docker/Dockerfile.info_gathering
    container_name: webbh-info-gathering
    hostname: webbh-info-gathering
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Recon-Core — reconnaissance worker
  # ---------------------------------------------------------------------------
  recon-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.recon
    container_name: webbh-recon-core
    hostname: webbh-recon-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Webapp Worker — headless browser web-app analysis
  # ---------------------------------------------------------------------------
  webapp-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.webapp
    container_name: webbh-webapp-worker
    hostname: webbh-webapp-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # API Worker — API endpoint security testing
  # ---------------------------------------------------------------------------
  api-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: webbh-api-worker
    hostname: webbh-api-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Cloud Worker — cloud asset discovery and testing
  # ---------------------------------------------------------------------------
  cloud-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.cloud
    container_name: webbh-cloud-worker
    hostname: webbh-cloud-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Fuzzing Worker — parameter and endpoint fuzzing
  # ---------------------------------------------------------------------------
  fuzzing-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.fuzzing
    container_name: webbh-fuzzing-worker
    hostname: webbh-fuzzing-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Vuln Scanner — Nuclei sweep + injection testing
  # ---------------------------------------------------------------------------
  vuln-scanner:
    build:
      context: .
      dockerfile: docker/Dockerfile.vulnscanner
    container_name: webbh-vuln-scanner
    hostname: webbh-vuln-scanner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Mobile Worker — mobile app SAST + Frida DAST
  # ---------------------------------------------------------------------------
  mobile-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.mobile
    container_name: webbh-mobile-worker
    hostname: webbh-mobile-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mobsf:
        condition: service_started
      docker-android:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MOBSF_URL: http://mobsf:8000
      MOBSF_API_KEY: ${MOBSF_API_KEY:-}
      ADB_HOST: docker-android
      ADB_PORT: "5555"
    volumes:
      - ./shared:/app/shared
      - mobile_analysis:/app/shared/mobile_analysis
      - mobile_binaries:/app/shared/mobile_binaries
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # MobSF — Mobile Security Framework (static analysis sidecar)
  # ---------------------------------------------------------------------------
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: webbh-mobsf
    restart: unless-stopped
    environment:
      MOBSF_API_KEY: ${MOBSF_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - mobile_analysis:/app/shared/mobile_analysis
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Docker-Android — headless Android emulator (Frida DAST sidecar)
  # ---------------------------------------------------------------------------
  docker-android:
    image: budtmo/docker-android:latest
    container_name: webbh-docker-android
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "5555:5555"
    volumes:
      - mobile_analysis:/app/shared/mobile_analysis
      - mobile_binaries:/app/shared/mobile_binaries
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Network Worker — port enum, service fingerprint, exploit verification
  # ---------------------------------------------------------------------------
  network-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.network
    container_name: webbh-network-worker
    hostname: webbh-network-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MSFRPC_PASS: msf_internal
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Chain Worker — multi-tool exploit chaining
  # ---------------------------------------------------------------------------
  chain-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.chain
    container_name: webbh-chain-worker
    hostname: webbh-chain-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MSFRPC_PASS: msf_internal
      CHAIN_STEP_DELAY_MS: "500"
      TOOL_TIMEOUT: "600"
      COOLDOWN_HOURS: "24"
    volumes:
      - ./shared/config:/app/shared/config
    mem_limit: 4g
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Reporting Worker — report generation and export
  # ---------------------------------------------------------------------------
  reporting-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.reporting
    container_name: webbh-reporting-worker
    hostname: webbh-reporting-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Traffic Proxy — mitmproxy-based request interceptor
  # ---------------------------------------------------------------------------
  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    container_name: webbh-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Callback Server — OOB interaction listener
  # ---------------------------------------------------------------------------
  callback:
    build:
      context: .
      dockerfile: docker/Dockerfile.callback
    container_name: webbh-callback
    restart: unless-stopped
    ports:
      - "9090:9090"
      - "9091:9091"
      - "9053:9053/udp"
      - "9443:9443"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Dashboard — Next.js C2 frontend
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
        NEXT_PUBLIC_API_KEY: ${WEB_APP_BH_API_KEY:-}
    container_name: webbh-dashboard
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      API_URL: http://orchestrator:8001
      API_KEY: ${WEB_APP_BH_API_KEY:-}
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_API_KEY: ${WEB_APP_BH_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./shared:/app/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - webbh-net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  mobile_analysis:
    driver: local
  mobile_binaries:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  webbh-net:
    driver: bridge
