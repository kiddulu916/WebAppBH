services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: webbh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-webbh}
      POSTGRES_USER: ${DB_USER:-webbh_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./shared/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webbh_admin} -d ${DB_NAME:-webbh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Redis — message broker (Streams)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: webbh-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Orchestrator — FastAPI control plane
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: webbh-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WEB_APP_BH_API_KEY: ${WEB_APP_BH_API_KEY:-}
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Dashboard — Next.js C2 frontend
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: webbh-dashboard
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://orchestrator:8001
      NEXT_PUBLIC_API_KEY: ${WEB_APP_BH_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./shared:/app/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - webbh-net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  shared:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  webbh-net:
    driver: bridge
