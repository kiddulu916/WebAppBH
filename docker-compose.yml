services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: webbh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-webbh}
      POSTGRES_USER: ${DB_USER:-webbh_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./shared/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webbh_admin} -d ${DB_NAME:-webbh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Redis — message broker (Streams)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: webbh-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Orchestrator — FastAPI control plane
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: webbh-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WEB_APP_BH_API_KEY: ${WEB_APP_BH_API_KEY:-}
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001"
      ENABLE_TEST_SEED: ${ENABLE_TEST_SEED:-true}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY:-}
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Base Image — shared Python runtime for all workers
  # ---------------------------------------------------------------------------
  webbh-base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: webbh-base:latest
    command: ["echo", "base image built"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Info Gathering Worker — WSTG 4.1 information gathering
  # ---------------------------------------------------------------------------
  info-gathering:
    build:
      context: .
      dockerfile: docker/Dockerfile.info_gathering
    container_name: webbh-info-gathering
    hostname: webbh-info-gathering
    restart: unless-stopped
    depends_on:
      webbh-base:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Legacy Workers — retained during migration period (M11 deferred)
  # See: docs/plans/implementation/2026-04-01-legacy-worker-retirement-status.md
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Recon-Core — legacy reconnaissance worker (replaced by info-gathering)
  # ---------------------------------------------------------------------------
  recon-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.recon
    container_name: webbh-recon-core
    hostname: webbh-recon-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Network Worker — legacy network worker (absorbed by config-mgmt)
  # ---------------------------------------------------------------------------
  network-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.network
    container_name: webbh-network-worker
    hostname: webbh-network-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MSFRPC_PASS: msf_internal
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Fuzzing Worker — legacy fuzzing worker (absorbed by config-mgmt + input-validation)
  # ---------------------------------------------------------------------------
  fuzzing-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.fuzzing
    container_name: webbh-fuzzing-worker
    hostname: webbh-fuzzing-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Cloud Worker — legacy cloud worker (absorbed by config-mgmt)
  # ---------------------------------------------------------------------------
  cloud-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.cloud
    container_name: webbh-cloud-worker
    hostname: webbh-cloud-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Webapp Worker — legacy webapp worker (absorbed by input-validation)
  # ---------------------------------------------------------------------------
  webapp-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.webapp
    container_name: webbh-webapp-worker
    hostname: webbh-webapp-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./shared:/app/shared
    networks:
