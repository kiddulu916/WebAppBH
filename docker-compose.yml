services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: webbh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-webbh}
      POSTGRES_USER: ${DB_USER:-webbh_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./shared/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webbh_admin} -d ${DB_NAME:-webbh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Redis — message broker (Streams)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: webbh-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Orchestrator — FastAPI control plane
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: webbh-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WEB_APP_BH_API_KEY: ${WEB_APP_BH_API_KEY:-}
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Recon-Core — reconnaissance worker
  # ---------------------------------------------------------------------------
  recon-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.recon
    container_name: webbh-recon-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Webapp Worker — headless browser web-app analysis
  # ---------------------------------------------------------------------------
  webapp-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.webapp
    container_name: webbh-webapp-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Mobile Worker — mobile app SAST + Frida DAST
  # ---------------------------------------------------------------------------
  mobile-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.mobile
    container_name: webbh-mobile-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mobsf:
        condition: service_started
      docker-android:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MOBSF_URL: http://mobsf:8000
      MOBSF_API_KEY: ${MOBSF_API_KEY:-}
      ADB_HOST: docker-android
      ADB_PORT: "5555"
    volumes:
      - ./shared:/app/shared
      - mobile_analysis:/app/shared/mobile_analysis
      - mobile_binaries:/app/shared/mobile_binaries
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # MobSF — Mobile Security Framework (static analysis sidecar)
  # ---------------------------------------------------------------------------
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: webbh-mobsf
    restart: unless-stopped
    environment:
      MOBSF_API_KEY: ${MOBSF_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - mobile_analysis:/app/shared/mobile_analysis
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Docker-Android — headless Android emulator (Frida DAST sidecar)
  # ---------------------------------------------------------------------------
  docker-android:
    image: budtmo/docker-android:latest
    container_name: webbh-docker-android
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "5555:5555"
    volumes:
      - mobile_analysis:/app/shared/mobile_analysis
      - mobile_binaries:/app/shared/mobile_binaries
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Network Worker — port enum, service fingerprint, exploit verification
  # ---------------------------------------------------------------------------
  network-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.network
    container_name: webbh-network-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MSFRPC_PASS: msf_internal
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Dashboard — Next.js C2 frontend
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: webbh-dashboard
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://orchestrator:8001
      NEXT_PUBLIC_API_KEY: ${WEB_APP_BH_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./shared:/app/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - webbh-net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  mobile_analysis:
    driver: local
  mobile_binaries:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  webbh-net:
    driver: bridge
