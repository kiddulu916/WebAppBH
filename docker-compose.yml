      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Vuln Scanner — legacy Nuclei scanner (absorbed by input-validation)
  # ---------------------------------------------------------------------------
  vuln-scanner:
    build:
      context: .
      dockerfile: docker/Dockerfile.vulnscanner
    container_name: webbh-vuln-scanner
    hostname: webbh-vuln-scanner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Identity-Mgmt — identity management worker
  # ---------------------------------------------------------------------------
  identity-mgmt:
    build:
      context: .
      dockerfile: docker/Dockerfile.identity
    container_name: webbh-identity-mgmt
    hostname: webbh-identity-mgmt
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Authentication — authentication worker
  # ---------------------------------------------------------------------------
  authentication:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    container_name: webbh-authentication
    hostname: webbh-authentication
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Authorization — authorization worker
  # ---------------------------------------------------------------------------
  authorization:
    build:
      context: .
      dockerfile: docker/Dockerfile.authz
    container_name: webbh-authorization
    hostname: webbh-authorization
    restart: unless-stopped
    depends_on:
      webbh-base:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_TYPE: authorization
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Config-Mgmt — configuration management worker
  # ---------------------------------------------------------------------------
  config-mgmt:
    build:
      context: .
      dockerfile: docker/Dockerfile.config_mgmt
    container_name: webbh-config-mgmt
    hostname: webbh-config-mgmt
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Input Validation — XSS, injection, and input-based vuln testing
  # ---------------------------------------------------------------------------
  input-validation:
    build:
      context: .
      dockerfile: docker/Dockerfile.input_validation
    container_name: webbh-input-validation
    hostname: webbh-input-validation
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Mobile Worker — mobile app SAST + Frida DAST
  # ---------------------------------------------------------------------------
  mobile-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.mobile
    container_name: webbh-mobile-worker
    hostname: webbh-mobile-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mobsf:
        condition: service_started
      docker-android:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MOBSF_URL: http://mobsf:8000
      MOBSF_API_KEY: ${MOBSF_API_KEY:-}
      ADB_HOST: docker-android
      ADB_PORT: "5555"
    volumes:
      - ./shared:/app/shared
      - mobile_analysis:/app/shared/mobile_analysis
      - mobile_binaries:/app/shared/mobile_binaries
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # MobSF — Mobile Security Framework (static analysis sidecar)
  # ---------------------------------------------------------------------------
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: webbh-mobsf
    restart: unless-stopped
    environment:
      MOBSF_API_KEY: ${MOBSF_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - mobile_analysis:/app/shared/mobile_analysis
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Docker-Android — headless Android emulator (Frida DAST sidecar)
  # ---------------------------------------------------------------------------
  docker-android:
    image: budtmo/docker-android:latest
    container_name: webbh-docker-android
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "5555:5555"
    volumes:
      - mobile_analysis:/app/shared/mobile_analysis
      - mobile_binaries:/app/shared/mobile_binaries
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Chain Worker — multi-tool exploit chaining
  # ---------------------------------------------------------------------------
  chain-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.chain
    container_name: webbh-chain-worker
    hostname: webbh-chain-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MSFRPC_PASS: msf_internal
      CHAIN_STEP_DELAY_MS: "500"
      TOOL_TIMEOUT: "600"
      COOLDOWN_HOURS: "24"
    volumes:
      - ./shared/config:/app/shared/config
    mem_limit: 4g
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Reporting Worker — report generation and export
  # ---------------------------------------------------------------------------
  reporting-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.reporting
    container_name: webbh-reporting-worker
    hostname: webbh-reporting-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Error Handling — error disclosure and stack trace detection
  # ---------------------------------------------------------------------------
  error_handling:
    build:
      context: .
      dockerfile: docker/Dockerfile.error_handling
    container_name: webbh-error-handling
    hostname: webbh-error-handling
    restart: unless-stopped
    depends_on:
      webbh-base:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_TYPE: error_handling
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Cryptography — SSL/TLS and cryptographic algorithm auditing
  # ---------------------------------------------------------------------------
  cryptography:
    build:
      context: .
      dockerfile: docker/Dockerfile.cryptography
    container_name: webbh-cryptography
    hostname: webbh-cryptography
    restart: unless-stopped
    depends_on:
      webbh-base:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_TYPE: cryptography
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Session-Mgmt — session management worker (WSTG 4.6)
  # ---------------------------------------------------------------------------
  session-mgmt:
    build:
      context: .
      dockerfile: docker/Dockerfile.session_mgmt
    container_name: webbh-session-mgmt
    hostname: webbh-session-mgmt
    restart: unless-stopped
    depends_on:
      webbh-base:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_TYPE: session_mgmt
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Business-Logic — business logic testing worker (WSTG 4.10)
  # ---------------------------------------------------------------------------
  business-logic:
    build:
      context: .
      dockerfile: docker/Dockerfile.business_logic
    container_name: webbh-business-logic
    hostname: webbh-business-logic
    restart: unless-stopped
    depends_on:
      webbh-base:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_TYPE: business_logic
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Client-Side — client-side testing worker with Playwright (WSTG 4.11)
  # ---------------------------------------------------------------------------
  client-side:
    build:
      context: .
      dockerfile: docker/Dockerfile.client_side
    container_name: webbh-client-side
    hostname: webbh-client-side
    restart: unless-stopped
    depends_on:
      webbh-base:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WORKER_TYPE: client_side
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Traffic Proxy — mitmproxy-based request interceptor
  # ---------------------------------------------------------------------------
  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    container_name: webbh-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Callback Server — OOB interaction listener
  # ---------------------------------------------------------------------------
  callback:
    build:
      context: .
      dockerfile: docker/Dockerfile.callback
    container_name: webbh-callback
    restart: unless-stopped
    ports:
      - "9090:9090"
      - "9091:9091"
      - "9053:9053/udp"
      - "9443:9443"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Reasoning Worker — LLM-powered vulnerability analysis
  # ---------------------------------------------------------------------------
  reasoning-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.reasoning
    container_name: webbh-reasoning-worker
    hostname: webbh-reasoning-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3:14b}
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Sandbox Worker — payload mutation engine (no GPU, no WASM)
  # ---------------------------------------------------------------------------
  sandbox-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    container_name: webbh-sandbox-worker
    hostname: webbh-sandbox-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-webbh}
      DB_USER: ${DB_USER:-webbh_admin}
      DB_PASS: ${DB_PASS:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MAX_MUTATION_CHAIN_DEPTH: "3"
      MAX_VARIANTS_PER_REQUEST: "50"
    volumes:
      - ./shared:/app/shared
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference server
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: webappbh-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - webbh-net

  # ---------------------------------------------------------------------------
  # Dashboard — Next.js C2 frontend
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
        NEXT_PUBLIC_API_KEY: ${WEB_APP_BH_API_KEY:-}
    container_name: webbh-dashboard
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      API_URL: http://orchestrator:8001
      API_KEY: ${WEB_APP_BH_API_KEY:-}
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_API_KEY: ${WEB_APP_BH_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./shared:/app/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - webbh-net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  mobile_analysis:
    driver: local
  mobile_binaries:
    driver: local
  ollama-models:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  webbh-net:
    driver: bridge
